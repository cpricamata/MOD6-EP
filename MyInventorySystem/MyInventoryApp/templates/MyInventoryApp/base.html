{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{%block title%}{%endblock%}</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static '/MyInventoryApp/css/baseCSS.css' %}">

<style>
ul a{
    text-decoration: none;
    color:#0f1556
}
ul a:hover {
    color: orange;
}
li{
    list-style-type: none;
    word-wrap: break-word;
}
.heading{
    color:black
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
</style>

</head>
<body>

<nav class="navbar navbar-dark bg-custom mb-3 sticky-top" style="background-color: #5c88c5;">
    <div class="container-fluid">
        <a class="navbar-brand mb-0" href="">Water Company Inc.</a>
        <a href="{% url 'add_bottle'%}" style="color:white">
            <i class="material-icons">add</i>
        </a>
    </div>
</nav>

<div class="flex-grow-1">

    <div class="heading">
        <h1 class="heading text-center">{%block heading%}{%endblock%}</h1>
    </div>

    <div class="container-fluid d-inline-block">
        <div class="row">
            <div class="col-2 ps-1 pl-3 text-start">
                
                <nav>
                {% block navigation %}
                <!-- navigation items -->
                {% endblock %}
                </nav>
                
            </div>

            <div class="col-8 ps-3 center">
                {% block content %}
                <!-- any extra content, place here-->
                {% endblock %}
            </div>
        </div>
    </div>

</div>

<footer class="footer bg-custom p-2 mt-auto" style="background-color: #5c88c5; color:aliceblue;">
    <div class="container text-center">@WaterCompanyInc.</div>
</footer> 

</body>
</html>
