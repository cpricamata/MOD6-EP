{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}

<div class="container py-4">

    <div class="row mb-4">
        <div class="pb-2">
            <h2>Manage Account</h2>
        </div>
        <hr>
    </div>

    <!-- Account Info -->
    <div class="row">
        <div class="col-md-8">

            <div class="border p-3">

                <p><strong>Username:</strong> {{ d.username }}</p>

                <!-- Buttons -->
                <div class="mt-3">

                    <!-- Change Password -->
                    <a href="{% url 'change_password' d.pk %}" class="btn btn-success">
                        Change Password
                    </a>

                    <!-- Delete Account -->
                    <a href="{% url 'delete_account' d.pk %}" class="btn btn-danger"
                       onclick="return confirm('Are you sure you want to delete account?');">
                        Delete Account
                    </a>

                    <!-- Back -->
                    <a href="{% url 'basic_list' pk=d.pk %}" class="btn btn-secondary">
                        Back
                    </a>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
